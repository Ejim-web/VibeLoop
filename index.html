<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>VibeLoop – Viral Short Videos</title>
  <link rel="manifest" href="data:application/manifest+json,{ &quot;name&quot;:&quot;VibeLoop&quot;, &quot;short_name&quot;:&quot;VibeLoop&quot;, &quot;start_url&quot;:&quot;.&quot;, &quot;display&quot;:&quot;standalone&quot;, &quot;background_color&quot;:&quot;#000000&quot;, &quot;theme_color&quot;:&quot;#8b5cf6&quot;, &quot;icons&quot;:[{ &quot;src&quot;:&quot;https://ui-avatars.com/api/?name=V&amp;size=144&quot;, &quot;sizes&quot;:&quot;144x144&quot;, &quot;type&quot;:&quot;image/png&quot; }] }" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    .snap-y { scroll-snap-type: y mandatory; }
    .video-card { scroll-snap-align: start; scroll-snap-stop: always; }
    video { pointer-events: none; object-fit: cover; }
    .loader { border: 3px solid #f3f3f3; border-top: 3px solid #8b5cf6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .comments-panel { background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); border-radius: 20px 20px 0 0; max-height: 60vh; overflow-y: auto; }
    .upload-progress { transition: width 0.3s; }
    .empty-feed { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; color: #666; }
    .sound-hint { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: #fff; padding: 8px 20px; border-radius: 30px; font-size: 14px; font-weight: 500; backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.15); z-index: 100; pointer-events: none; opacity: 0; transition: opacity 0.5s ease; display: flex; align-items: center; gap: 8px; }
    .sound-hint.visible { opacity: 1; }
    .sound-hint i { font-size: 16px; }
    .chat-user { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #222; cursor: pointer; }
    .chat-user:hover { background: #1a1a1a; }
    .chat-user .avatar { width: 48px; height: 48px; border-radius: 50%; background: #333; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #aaa; margin-right: 12px; overflow: hidden; }
    .chat-user .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .chat-messages { height: 60vh; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; }
    .message { margin-bottom: 8px; max-width: 80%; padding: 8px 14px; border-radius: 18px; font-size: 14px; word-wrap: break-word; }
    .message.sent { background: #8b5cf6; align-self: flex-end; }
    .message.received { background: #2a2a2a; align-self: flex-start; }
    .chat-input { display: flex; gap: 8px; padding: 12px; border-top: 1px solid #222; }
    .chat-input input { flex: 1; background: #1a1a1a; border: none; border-radius: 24px; padding: 10px 16px; color: white; outline: none; }
    .chat-input button { background: #8b5cf6; border: none; border-radius: 24px; padding: 10px 20px; color: white; font-weight: bold; }
    .video-modal { position: fixed; inset: 0; z-index: 80; background: black; display: flex; align-items: center; justify-content: center; }
    .video-modal video { width: 100%; height: 100%; object-fit: contain; }
    .video-modal .close-modal { position: absolute; top: 20px; right: 20px; z-index: 90; background: rgba(0,0,0,0.6); border-radius: 50%; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; cursor: pointer; }
    .feed-tab { background: transparent; border: none; color: #888; font-weight: 600; font-size: 16px; padding: 8px 16px; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
    .feed-tab.active { color: white; border-bottom-color: #8b5cf6; }
    .search-bar { background: #1a1a1a; border: none; border-radius: 24px; padding: 8px 16px; color: white; width: 100%; outline: none; font-size: 14px; }
    .search-bar::placeholder { color: #666; }
    .profile-avatar { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid #8b5cf6; cursor: pointer; }
    .edit-modal { position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
    .edit-modal .modal-content { background: #1a1a1a; border-radius: 24px; padding: 24px; max-width: 400px; width: 90%; }
    .edit-modal .modal-content h2 { font-size: 20px; font-weight: bold; margin-bottom: 16px; }
    .edit-modal .modal-content label { display: block; margin: 12px 0 4px; color: #aaa; font-size: 14px; }
    .edit-modal .modal-content input[type="text"], .edit-modal .modal-content textarea { width: 100%; background: #111; border: 1px solid #333; border-radius: 8px; padding: 8px 12px; color: white; font-size: 14px; }
    .edit-modal .modal-content textarea { min-height: 80px; resize: vertical; }
    .edit-modal .modal-content .avatar-upload { display: flex; align-items: center; gap: 12px; margin: 8px 0; }
    .edit-modal .modal-content .avatar-upload img { width: 64px; height: 64px; border-radius: 50%; object-fit: cover; border: 2px solid #8b5cf6; }
    .edit-modal .modal-content .avatar-upload button { background: #333; border: none; color: white; padding: 6px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; }
    .edit-modal .modal-content .actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
    .edit-modal .modal-content .actions button { padding: 8px 20px; border-radius: 24px; border: none; font-weight: 600; cursor: pointer; }
    .edit-modal .modal-content .actions .save-btn { background: #8b5cf6; color: white; }
    .edit-modal .modal-content .actions .cancel-btn { background: #333; color: #aaa; }
    .login-logo { font-size: 48px; display: flex; align-items: center; justify-content: center; gap: 12px; }
    .login-logo i { font-size: 56px; background: linear-gradient(135deg, #a78bfa, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .login-logo .logo-text { font-size: 48px; font-weight: 900; background: linear-gradient(135deg, #a78bfa, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: -1px; }
    .feed-header-logo { display: flex; align-items: center; gap: 6px; font-size: 18px; font-weight: 800; color: white; margin-right: 12px; }
    .feed-header-logo i { font-size: 22px; background: linear-gradient(135deg, #a78bfa, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .feed-header-logo span { background: linear-gradient(135deg, #a78bfa, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .follow-btn { transition: all 0.2s; }
    .follow-btn.following { background: rgba(139, 92, 246, 0.4); border: 1px solid #8b5cf6; color: #c4b5fd; }
    .follow-btn.following:hover { background: rgba(239, 68, 68, 0.3); border-color: #ef4444; color: #fca5a5; }
    .user-profile-link { cursor: pointer; display: flex; align-items: center; gap: 6px; }
    .user-profile-link:hover { text-decoration: underline; }
    .message-btn { background: white; color: #1a1a1a; padding: 6px 16px; border-radius: 9999px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; transition: all 0.2s; }
    .message-btn:hover { background: #e5e5e5; }

    /* ─── FIX: Hide file inputs ─── */
    #videoUploadInput,
    #imageUploadInput {
      display: none !important;
    }
  </style>
</head>
<body class="bg-black text-white">

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-purple-900 to-black p-6 fixed inset-0 z-50 transition-all">
  <div class="text-center max-w-md w-full">
    <div class="login-logo mb-4">
      <i class="fas fa-waveform"></i>
      <span class="logo-text">VibeLoop</span>
    </div>
    <p class="text-gray-300">Low data. High vibes.</p>
    <div class="mt-8 bg-white/10 backdrop-blur rounded-2xl p-6 space-y-3">
      <input id="loginEmail" type="email" placeholder="Email" class="w-full bg-black/50 border border-white/20 rounded-xl p-3 text-white" />
      <input id="loginPass" type="password" placeholder="Password" class="w-full bg-black/50 border border-white/20 rounded-xl p-3 text-white" />
      <button id="emailLoginBtn" class="w-full bg-purple-600 hover:bg-purple-700 transition py-3 rounded-xl font-bold">Login</button>
      <button id="emailSignupBtn" class="w-full border border-white/30 hover:bg-white/10 transition py-3 rounded-xl">Create Account</button>
      <div class="relative"><div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/20"></div></div><div class="relative flex justify-center text-xs"><span class="bg-black px-2">OR</span></div></div>
      <button id="googleLoginBtn" class="w-full bg-white/10 hover:bg-white/20 transition py-3 rounded-xl flex items-center justify-center gap-2"><i class="fab fa-google"></i> Google</button>
    </div>
    <p class="text-xs text-gray-400 mt-4">By continuing, you agree to our Terms</p>
  </div>
</div>

<!-- MAIN APP -->
<div id="mainApp" class="hidden relative h-screen">
  <div class="fixed bottom-0 left-0 right-0 z-50 bg-black/80 backdrop-blur-2xl border-t border-white/10 flex justify-around py-2 safe-bottom">
    <button data-nav="feed" class="nav-btn flex flex-col items-center text-xs text-purple-500"><i class="fas fa-play-circle text-2xl"></i><span>Home</span></button>
    <button data-nav="trending" class="nav-btn flex flex-col items-center text-xs text-gray-400"><i class="fas fa-fire text-2xl"></i><span>Trending</span></button>
    <button data-nav="chat" class="nav-btn flex flex-col items-center text-xs text-gray-400"><i class="fas fa-comment-dots text-2xl"></i><span>Chat</span></button>
    <button data-nav="profile" class="nav-btn flex flex-col items-center text-xs text-gray-400"><i class="fas fa-user text-2xl"></i><span>Me</span></button>
  </div>
  <button id="uploadFab" class="fixed right-5 bottom-24 bg-gradient-to-r from-purple-600 to-pink-600 w-14 h-14 rounded-full shadow-2xl flex items-center justify-center text-white text-2xl z-50"><i class="fas fa-plus"></i></button>
  <div id="contentArea" class="pb-20 h-full overflow-y-auto"></div>
  <!-- FILE INPUTS – NOW HIDDEN BY CSS -->
  <input type="file" id="videoUploadInput" accept="video/*" />
  <input type="file" id="imageUploadInput" accept="image/*" />
</div>

<div id="soundHint" class="sound-hint"><i class="fas fa-volume-up"></i> Tap to unmute</div>
