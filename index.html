<script type="module">
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  const CLOUDINARY_CLOUD_NAME = "qgbhjuse";
  const CLOUDINARY_UPLOAD_PRESET = "vibeloop_uploads";

  import { initializeApp } from "firebase/app";
  import { getAuth, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "firebase/auth";
  import { getFirestore, collection, doc, setDoc, getDoc, getDocs, updateDoc, addDoc, query, orderBy, limit, onSnapshot, increment, serverTimestamp, where, deleteDoc } from "firebase/firestore";
  import { getMessaging, getToken } from "firebase/messaging";
  import { getFunctions, httpsCallable } from "firebase/functions";

  const firebaseConfig = {
    apiKey: "AIzaSyCr1IkJ6_SMhTJvY3K3GG6SoIRe1LOZ0nQ",
    authDomain: "vibeloop-44c45.firebaseapp.com",
    projectId: "vibeloop-44c45",
    storageBucket: "vibeloop-44c45.appspot.com",
    messagingSenderId: "776248914692",
    appId: "1:776248914692:web:b883192e8498e5a5351651"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const functions = getFunctions(app);
  const messaging = getMessaging(app);
  const googleProvider = new GoogleAuthProvider();

  const addCoins = httpsCallable(functions, 'addCoins');
  const sendGift = httpsCallable(functions, 'sendGift');
  const sendNotification = httpsCallable(functions, 'sendNotification');

  // ─── State ──────────────────────────────────────────────────
  let currentUser = null;
  let activeTab = 'feed';
  let feedVideos = [];
  let videoObserver = null;
  let watchStartTimes = new Map();
  let sessionCount = parseInt(localStorage.getItem('sessionCount') || 0);
  let notificationsRequested = false;
  let unsubscribeComments = null;
  let unsubscribeFeed = null;
  let unsubscribeMessages = null;
  let isUploading = false;
  let soundEnabled = localStorage.getItem('soundEnabled') === 'true';
  const soundHint = document.getElementById('soundHint');
  if (!soundEnabled) soundHint.classList.add('visible');

  let feedFilter = 'forYou';
  let searchQuery = '';
  let followedUsers = new Set();

  function enableSound() {
    if (soundEnabled) return;
    soundEnabled = true;
    localStorage.setItem('soundEnabled', 'true');
    soundHint.classList.remove('visible');
    document.querySelectorAll('.video-card video').forEach(v => {
      v.muted = false;
      if (v.paused) v.play().catch(() => {});
    });
  }
  document.addEventListener('click', enableSound, { once: false });

  // ─── Toast ──────────────────────────────────────────────────
  function showToast(msg, type = 'info') {
    const t = document.createElement('div');
    t.className = `fixed bottom-20 left-4 right-4 z-[100] p-3 rounded-xl text-center text-sm font-semibold shadow-2xl transition-all duration-300 ${type === 'error' ? 'bg-red-600' : 'bg-black/80 backdrop-blur-lg'} text-white`;
    t.innerText = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  function escapeHtml(s) { return s?.replace(/[&<>]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[m])) || ''; }

  // ─── Cloudinary upload ──────────────────────────────────────
  function uploadToCloudinary(file, resourceType = 'video') {
    return new Promise((resolve, reject) => {
      const fd = new FormData();
      fd.append('file', file);
      fd.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
      fd.append('resource_type', resourceType);
      const xhr = new XMLHttpRequest();
      xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/${resourceType}/upload`, true);
      xhr.upload.onprogress = (e) => {
        if (e.lengthComputable) {
          const pct = Math.round((e.loaded/e.total)*100);
          const bar = document.getElementById('uploadProgressBar');
          const lbl = document.getElementById('uploadPercent');
          if (bar) bar.style.width = pct+'%';
          if (lbl) lbl.textContent = pct;
        }
      };
      xhr.onload = () => {
        if (xhr.status >= 200 && xhr.status < 300) {
          try { resolve(JSON.parse(xhr.responseText)); } catch (e) { reject(new Error('Invalid JSON')); }
        } else {
          let msg = 'Upload failed';
          try { const err = JSON.parse(xhr.responseText); msg = err.error?.message || msg; } catch (e) {}
          reject(new Error(msg));
        }
      };
      xhr.onerror = () => reject(new Error('Network error'));
      xhr.send(fd);
    });
  }

  // ─── Upload video ────────────────────────────────────────────
  async function uploadVideo(file, caption) {
    if (isUploading) { showToast('⏳ Already uploading', 'info'); return; }
    if (!currentUser) { showToast('❌ Login required', 'error'); return; }
    const banned = ['spam','scam','sex','porn','hate'];
    if (banned.some(w => caption.toLowerCase().includes(w))) { showToast('⛔ Banned word', 'error'); return; }
    const MAX_SIZE = 200 * 1024 * 1024;
    if (file.size > MAX_SIZE) {
      showToast(`📁 Too large (${(file.size/1024/1024).toFixed(1)}MB). Max 200MB`, 'error');
      return;
    }
    isUploading = true;
    const overlay = document.createElement('div');
    overlay.className = 'fixed inset-0 z-[70] bg-black/80 flex flex-col items-center justify-center';
    overlay.innerHTML = `
      <div class="w-64 bg-white/20 rounded-full h-4 overflow-hidden">
        <div id="uploadProgressBar" class="upload-progress bg-purple-500 h-full w-0"></div>
      </div>
      <p class="mt-4 text-sm text-gray-300">Uploading... <span id="uploadPercent">0</span>%</p>
    `;
    document.body.appendChild(overlay);
    try {
      const data = await uploadToCloudinary(file, 'video');
      const url = data.secure_url;
      if (!url) throw new Error('No secure_url');
      const low = url.replace('/upload/', '/upload/w_360,q_auto/');
      const thumb = url.replace('/upload/', '/upload/w_540,h_960,c_fill/');
      const customId = Date.now() + '_' + Math.random().toString(36).slice(2,8);
      const tags = (caption.match(/#[\w\u0600-\u06FF]+/g)||[]).map(t=>t.toLowerCase());
      const userSnap = await getDoc(doc(db,'users',currentUser.uid));
      const userData = userSnap.data() || {};
      const avatarUrl = userData.avatarUrl || 'https://ui-avatars.com/api/?name='+encodeURIComponent(currentUser.displayName||'User');
      const docRef = await addDoc(collection(db,'videos'), {
        customId,
        creatorId: currentUser.uid,
        creatorName: currentUser.displayName || currentUser.email.split('@')[0],
        creatorAvatar: avatarUrl,
        caption,
        videoUrl: url,
        lowResUrl: low,
        thumbnailUrl: thumb,
        durationSeconds: data.duration || 15,
        hashtags: tags,
        likesCount: 0,
        commentsCount: 0,
        sharesCount: 0,
        viewsCount: 0,
        watchTimeTotal: 0,
        status: 'ready',
        createdAt: serverTimestamp()
      });
      overlay.remove();
      showToast('✅ Uploaded!');
    } catch (e) {
      overlay.remove();
      console.error(e);
      showToast('❌ Upload failed: '+e.message, 'error');
    } finally {
      isUploading = false;
    }
  }

  // ─── Upload profile image ────────────────────────────────────
  async function uploadProfileImage(file) {
    if (!currentUser) { showToast('Login required', 'error'); return; }
    isUploading = true;
    const overlay = document.createElement('div');
    overlay.className = 'fixed inset-0 z-[70] bg-black/80 flex flex-col items-center justify-center';
    overlay.innerHTML = `
      <div class="w-64 bg-white/20 rounded-full h-4 overflow-hidden">
        <div id="uploadProgressBar" class="upload-progress bg-purple-500 h-full w-0"></div>
      </div>
      <p class="mt-4 text-sm text-gray-300">Uploading photo... <span id="uploadPercent">0</span>%</p>
    `;
    document.body.appendChild(overlay);
    try {
      const data = await uploadToCloudinary(file, 'image');
      const url = data.secure_url;
      if (!url) throw new Error('No secure_url');
      await updateDoc(doc(db,'users',currentUser.uid), { avatarUrl: url });
      overlay.remove();
      showToast('✅ Profile photo updated!');
      renderProfile();
    } catch (e) {
      overlay.remove();
      console.error(e);
      showToast('❌ Failed to upload photo: '+e.message, 'error');
    } finally {
      isUploading = false;
    }
  }

  // ─── Update bio ──────────────────────────────────────────────
  async function updateBio(bio) {
    if (!currentUser) return;
    try {
      await updateDoc(doc(db,'users',currentUser.uid), { bio });
      showToast('✅ Bio updated!');
      renderProfile();
    } catch (e) {
      console.error(e);
      showToast('❌ Failed to update bio: '+e.message, 'error');
    }
  }

  // ─── Edit Profile Modal ─────────────────────────────────────
  function showEditProfileModal() {
    const modal = document.createElement('div');
    modal.className = 'edit-modal';
    modal.innerHTML = `
      <div class="modal-content">
        <h2>Edit Profile</h2>
        <label>Profile Photo</label>
        <div class="avatar-upload">
          <img src="${currentUser?.photoURL || 'https://ui-avatars.com/api/?name='+encodeURIComponent(currentUser?.displayName||'User')}" id="editAvatarPreview" />
          <button id="changePhotoBtn">Change Photo</button>
        </div>
        <label>Bio</label>
        <textarea id="editBioInput" placeholder="Tell us about yourself...">${currentUser?.bio || ''}</textarea>
        <div class="actions">
          <button class="cancel-btn" id="editCancelBtn">Cancel</button>
          <button class="save-btn" id="editSaveBtn">Save</button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);

    const fileInput = document.getElementById('imageUploadInput');
    modal.querySelector('#changePhotoBtn').onclick = () => {
      fileInput.value = '';
      fileInput.click();
    };
    fileInput.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      await uploadProfileImage(file);
      fileInput.value = '';
      const snap = await getDoc(doc(db,'users',currentUser.uid));
      const url = snap.data().avatarUrl || 'https://ui-avatars.com/api/?name='+encodeURIComponent(currentUser.displayName||'User');
      modal.querySelector('#editAvatarPreview').src = url;
    };

    modal.querySelector('#editSaveBtn').onclick = async () => {
      const bio = modal.querySelector('#editBioInput').value.trim();
      await updateBio(bio);
      modal.remove();
    };

    modal.querySelector('#editCancelBtn').onclick = () => modal.remove();
    modal.addEventListener('click', (e) => {
      if (e.target === modal) modal.remove();
    });
  }

  // ─── Follow / Unfollow ──────────────────────────────────────
  async function toggleFollow(creatorId, buttonEl) {
    if (!currentUser) { showToast('Login to follow', 'error'); return; }
    if (creatorId === currentUser.uid) { showToast('You can\'t follow yourself', 'info'); return; }

    const followDocId = `${currentUser.uid}_${creatorId}`;
    const followRef = doc(db, 'follows', followDocId);
    const snap = await getDoc(followRef);

    try {
      if (snap.exists()) {
        await deleteDoc(followRef);
        followedUsers.delete(creatorId);
        if (buttonEl) {
          buttonEl.textContent = 'Follow';
          buttonEl.className = 'follow-btn text-xs bg-white/20 px-2 py-1 rounded-full';
        }
        showToast('Unfollowed');
      } else {
        await setDoc(followRef, {
          followerId: currentUser.uid,
          followeeId: creatorId,
          createdAt: serverTimestamp()
        });
        followedUsers.add(creatorId);
        if (buttonEl) {
          buttonEl.textContent = 'Following';
          buttonEl.className = 'follow-btn following text-xs px-2 py-1 rounded-full';
        }
        showToast('Followed!');
      }
      // Update follower count on user's profile
      const userRef = doc(db, 'users', creatorId);
      const userSnap = await getDoc(userRef);
      if (userSnap.exists()) {
        const currentCount = userSnap.data().followersCount || 0;
        const newCount = snap.exists() ? Math.max(0, currentCount - 1) : currentCount + 1;
        await updateDoc(userRef, { followersCount: newCount });
      }
      // If we are viewing that user's profile, refresh the profile
      if (window.currentProfileUid === creatorId) {
        renderUserProfile(creatorId);
      }
    } catch (err) {
      console.error('Follow error:', err);
      showToast('Error: ' + err.message, 'error');
    }
  }

  // ─── View another user's profile ──────────────────────────
  let viewingProfile = false;
  let previousTab = 'feed';

  async function renderUserProfile(uid) {
    if (!uid) return;
    viewingProfile = true;
    previousTab = activeTab;
    const area = document.getElementById('contentArea');
    area.innerHTML = `<div class="p-4"><div class="loader"></div></div>`;
    try {
      const userSnap = await getDoc(doc(db,'users',uid));

      const user = userSnap.data();
      const videosSnap = await getDocs(query(collection(db,'videos'), where('creatorId','==',uid), orderBy('createdAt','desc')));
      let totalViews=0, totalWatch=0, totalCoins=0;
      videosSnap.forEach(v=>{ totalViews += v.data().viewsCount||0; totalWatch += v.data().watchTimeTotal||0; });
      const giftsSnap = await getDocs(query(collection(db,'gifts'), where('to','==',uid)));
      giftsSnap.forEach(g=> totalCoins += g.data().amount||0);
      const avatarUrl = user.avatarUrl || 'https://ui-avatars.com/api/?name='+encodeURIComponent(user.username||'User')+'&size=120';
      const isSelf = uid === currentUser.uid;
      const isFollowing = followedUsers.has(uid);

      // Button logic:
      // - If self: no buttons.
      // - If not following: only "Follow" button.
      // - If following: show "Message" + "Following" (unfollow via the Following button).
      let buttonsHtml = '';
      if (!isSelf) {
        if (isFollowing) {
          // Show Message + Following (which can be clicked to unfollow)
          buttonsHtml = `
            <button id="profileMessageBtn" class="message-btn text-sm px-4 py-1 rounded-full">
              <i class="fas fa-comment-dots mr-1"></i> Message
            </button>
            <button id="profileFollowBtn" class="follow-btn following text-sm px-4 py-1 rounded-full" style="background:rgba(139,92,246,0.4);border:1px solid #8b5cf6;color:#c4b5fd;">
              Following
            </button>
          `;
        } else {
          // Only Follow
          buttonsHtml = `
            <button id="profileFollowBtn" class="follow-btn text-sm px-4 py-1 rounded-full" style="background:#8b5cf6;color:white;">
              Follow
            </button>
          `;
        }
      }

      area.innerHTML = `
        <div class="p-5 text-center">
          <div class="flex items-center gap-4 mb-4">
            <button id="backFromProfile" class="text-white"><i class="fas fa-arrow-left text-2xl"></i></button>
            <div class="flex-1"></div>
          </div>
          <img src="${avatarUrl}" class="profile-avatar mx-auto" alt="profile" />
          <h2 class="text-2xl font-bold mt-2">${escapeHtml(user.username||uid.slice(0,8))}</h2>
          <p class="text-gray-400 text-sm">@${escapeHtml(user.username||uid.slice(0,8))}</p>
          <p class="text-gray-300 text-sm mt-1">${escapeHtml(user.bio||'')}</p>
          <div class="flex justify-center gap-3 mt-3">
            ${buttonsHtml}
          </div>
          <div class="flex justify-center gap-6 my-4">
            <div><span class="font-bold">${user.followersCount||0}</span><p class="text-xs">Followers</p></div>
            <div><span>${user.followingCount||0}</span><p class="text-xs">Following</p></div>
            <div><span>${user.coins||0}</span><p class="text-xs">💰 Coins</p></div>
          </div>
          <div class="bg-white/5 rounded-xl p-3 mb-4">
            <h3 class="font-bold">📊 Creator Analytics</h3>
            <div class="flex justify-around text-sm mt-2">
              <div>👁️ ${totalViews} views</div>
              <div>⏱️ ${Math.floor(totalWatch/60)} min</div>
              <div>🎁 ${totalCoins} coins</div>
            </div>
          </div>
          <div id="userVideos" class="grid grid-cols-3 gap-1 mt-4"></div>
        </div>
      `;
      // Show videos
      const grid = document.getElementById('userVideos');
      grid.innerHTML = '';
      videosSnap.forEach(v => {
        const vid = v.data();
        const thumb = document.createElement('div');
        thumb.className = 'user-video-thumb relative cursor-pointer';
        thumb.dataset.docId = v.id;
        thumb.innerHTML = `<video src="${vid.lowResUrl || vid.videoUrl}" class="aspect-square object-cover rounded-md" preload="metadata"></video>
          <div class="absolute bottom-1 right-1 bg-black/60 text-xs px-1 rounded">${vid.likesCount||0} ♥</div>`;

      // Back button
      document.getElementById('backFromProfile').onclick = () => {
        viewingProfile = false;

      const profileFollowBtn = document.getElementById('profileFollowBtn');
      if (profileFollowBtn) {
        profileFollowBtn.onclick = async () => {
          await toggleFollow(uid, profileFollowBtn);
          // Re‑render the profile after follow/unfollow to update buttons
          renderUserProfile(uid);

      }

      // Message button on profile (if it exists)
      const profileMessageBtn = document.getElementById('profileMessageBtn');
      if (profileMessageBtn) {

  // ─── Feed listener ──────────────────────────────────────────
  function buildFeedQuery() {
    return query(collection(db,'videos'), orderBy('createdAt','desc'), limit(50));
  }

  function startFeedListener() {
    if (unsubscribeFeed) { unsubscribeFeed(); unsubscribeFeed = null; }
    const q = buildFeedQuery();
    unsubscribeFeed = onSnapshot(q, async (snap) => {
      const stack = document.getElementById('feedStack');
      if (!stack) return;
      let videos = snap.docs.map(d => ({ docId: d.id, ...d.data() }));
      videos = videos.filter(v => v.status === 'ready');

      if (feedFilter === 'following' && currentUser) {
        const followsSnap = await getDocs(query(collection(db,'follows'), where('followerId','==',currentUser.uid)));
        const followedIds = followsSnap.docs.map(d => d.data().followeeId);
        videos = videos.filter(v => followedIds.includes(v.creatorId));
        followedUsers = new Set(followedIds);
      }

      if (searchQuery.trim()) {
        const qLower = searchQuery.toLowerCase().trim();
        videos = videos.filter(v => 
          v.caption?.toLowerCase().includes(qLower) ||
          v.hashtags?.some(t => t.toLowerCase().includes(qLower))
        );
      }

      if (videos.length === 0) {
        stack.innerHTML = `<div class="empty-feed text-center p-4">
          <i class="fas fa-video text-6xl text-purple-400 mb-4"></i>
          <p class="text-gray-400">No videos ${feedFilter === 'following' ? 'from people you follow' : ''}</p>
          <p class="text-gray-500 text-sm">${searchQuery ? 'Try a different search' : 'Be the first to upload!'}</p>
        </div>`;
        feedVideos = [];
        return;
      }
      feedVideos = videos;
      renderFeed(videos, stack);
    }, (err) => {
      console.error('Feed error:', err);
      showToast('Feed error: '+err.message, 'error');
    });
  }

  function renderFeed(videos, stack) {
    const loader = document.getElementById('feedLoader');
    if (loader) loader.remove();
    stack.innerHTML = '';
    videos.forEach(v => stack.appendChild(createVideoCard(v)));
    if (videoObserver) videoObserver.disconnect();
    videoObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const vid = entry.target.querySelector('video');
        if (!vid) return;
        if (entry.isIntersecting) {
          if (vid.src !== entry.target.dataset.videoUrl) vid.src = entry.target.dataset.videoUrl;
          if (soundEnabled) vid.muted = false;
          else vid.muted = true;
          vid.play().catch(() => {});
          watchStartTimes.set(entry.target.dataset.docId, Date.now());
        } else {
          vid.pause();
          if (watchStartTimes.has(entry.target.dataset.docId)) {
            const s = Math.floor((Date.now() - watchStartTimes.get(entry.target.dataset.docId))/1000);
            if (s>0) updateWatchTime(entry.target.dataset.docId, s);
            watchStartTimes.delete(entry.target.dataset.docId);
          }
        }
      });
    }, { threshold: 0.5 });
    document.querySelectorAll('.video-card').forEach(c => videoObserver.observe(c));
  }

  // ─── Video card ──────────────────────────────────────────────
  function createVideoCard(video) {
    const url = video.lowResUrl || video.videoUrl;
    const div = document.createElement('div');
    div.className = 'video-card relative h-screen snap-start snap-always bg-black';
    div.dataset.docId = video.docId;
    div.dataset.videoUrl = url;

    const isFollowing = followedUsers.has(video.creatorId);
    const followBtnClass = isFollowing ? 'follow-btn following text-xs px-2 py-1 rounded-full' : 'follow-btn text-xs bg-white/20 px-2 py-1 rounded-full';
    const followText = isFollowing ? 'Following' : 'Follow';
    const avatarUrl = video.creatorAvatar || 'https://ui-avatars.com/api/?name='+encodeURIComponent(video.creatorName||'User');

    div.innerHTML = `
      <video class="absolute inset-0 w-full h-full object-cover" playsinline poster="${video.thumbnailUrl || ''}" preload="metadata" autoplay></video>
      <div class="absolute bottom-36 left-4 right-20 z-20">
        <div class="flex items-center gap-2">
          <div class="user-profile-link" data-uid="${video.creatorId}">
            <img src="${avatarUrl}" class="w-8 h-8 rounded-full object-cover" />
            <span class="font-bold">${escapeHtml(video.creatorName)}</span>
          </div>
          <button class="${followBtnClass}" data-creator="${video.creatorId}">${followText}</button>
        </div>
        <p class="text-sm mt-2">${escapeHtml(video.caption || '')}</p>
        <div class="flex gap-1 text-xs text-gray-300 mt-1">${(video.hashtags||[]).map(t=>`<span>${escapeHtml(t)}</span>`).join(' ')}</div>
      </div>
      <div class="absolute bottom-40 right-3 z-20 flex flex-col gap-5 items-center">
        <button class="like-btn"><i class="far fa-heart text-3xl"></i><span class="text-xs">${video.likesCount||0}</span></button>
        <button class="comment-btn"><i class="far fa-comment text-3xl"></i><span class="text-xs">${video.commentsCount||0}</span></button>
        <button class="share-btn"><i class="fas fa-share-alt text-3xl"></i></button>
        <button class="gift-btn"><i class="fas fa-gift text-3xl"></i></button>
        <button class="report-btn"><i class="fas fa-flag text-2xl"></i></button>
      </div>
    `;
    return div;
  }

  // ─── Watch time ──────────────────────────────────────────────
  async function updateWatchTime(docId, seconds) {
    if (!currentUser) return;
    try {
      const id = `${currentUser.uid}_${docId}`;
      const ref = doc(db,'interactions',id);
      const snap = await getDoc(ref);
      if (snap.exists()) {
        await updateDoc(ref, { watchedSeconds: increment(seconds), lastUpdated: serverTimestamp() });
      } else {
        await setDoc(ref, { userId: currentUser.uid, videoId: docId, watchedSeconds: seconds, lastUpdated: serverTimestamp() });
      }
      await updateDoc(doc(db,'videos',docId), { watchTimeTotal: increment(seconds) });
      const viewKey = `${currentUser.uid}_${docId}`;
      const viewRef = doc(db,'video_views',viewKey);
      if (!(await getDoc(viewRef)).exists()) {
        await setDoc(viewRef, { userId: currentUser.uid, videoId: docId, createdAt: serverTimestamp() });
        await updateDoc(doc(db,'videos',docId), { viewsCount: increment(1) });
      }
    } catch (e) { console.warn('watch time error', e); }
  }

  // ─── Comments ────────────────────────────────────────────────
  async function showComments(docId) {
    if (!currentUser) { showToast('Login to comment', 'error'); return; }
    if (unsubscribeComments) unsubscribeComments();
    const modal = document.createElement('div');
    modal.className = 'fixed inset-0 z-[60] flex flex-col justify-end';
    modal.innerHTML = `
      <div class="bg-black/80 absolute inset-0" onclick="this.parentElement.remove()"></div>
      <div class="comments-panel bg-[#111] p-4 relative">
        <h3 class="font-bold text-lg mb-2">Comments</h3>
        <div id="commentsList" class="max-h-64 overflow-y-auto space-y-2 mb-3"></div>
        <div class="flex gap-2">
          <input id="commentInput" placeholder="Add a comment..." class="flex-1 bg-white/10 rounded-full p-2 text-sm" />
          <button id="postCommentBtn" class="bg-purple-600 px-4 rounded-full">Post</button>
        </div>
        <button id="closeComments" class="mt-3 text-gray-400 text-sm w-full">Close</button>
      </div>
    `;
    document.body.appendChild(modal);
    const q = query(collection(db,'videos',docId,'comments'), orderBy('createdAt','desc'), limit(50));
    unsubscribeComments = onSnapshot(q, snap => {
      const list = modal.querySelector('#commentsList');
      list.innerHTML = '';
      snap.forEach(d => {
        const c = d.data();
        list.innerHTML += `<div class="text-sm"><strong>${escapeHtml(c.userName)}</strong>: ${escapeHtml(c.text)}</div>`;
      });
    });
    modal.querySelector('#postCommentBtn').onclick = async () => {
      const input = modal.querySelector('#commentInput');
      const text = input.value.trim();
      if (!text) return;
      await addDoc(collection(db,'videos',docId,'comments'), {
        userId: currentUser.uid,
        userName: currentUser.displayName || currentUser.email.split('@')[0],
        text,
        createdAt: serverTimestamp()
      });
      await updateDoc(doc(db,'videos',docId), { commentsCount: increment(1) });
      input.value = '';
      const vidSnap = await getDoc(doc(db,'videos',docId));
      const creatorId = vidSnap.data().creatorId;
      if (creatorId !== currentUser.uid) {
        await sendNotification({ userId: creatorId, title: 'New comment', body: `${currentUser.displayName} commented` });
      }
    };
    modal.querySelector('#closeComments').onclick = () => { if (unsubscribeComments) unsubscribeComments(); modal.remove(); };
  }

  // ─── Click handlers ─────────────────────────────────────────
  document.addEventListener('click', async (e) => {
    // Click on user profile link (avatar or username) in video card
    const profileLink = e.target.closest('.user-profile-link');
    if (profileLink) {
      e.preventDefault();
      const uid = profileLink.dataset.uid;
      if (uid) {
        if (uid === currentUser.uid) {
          setActiveTab('profile');
        } else {
          renderUserProfile(uid);
        }
      }
      return;
    }

    // Follow button
    const followBtn = e.target.closest('.follow-btn');
    if (followBtn) {
      e.preventDefault();
      const creatorId = followBtn.dataset.creator;
      if (creatorId) {
        await toggleFollow(creatorId, followBtn);
        if (feedFilter === 'following' && unsubscribeFeed) {
          unsubscribeFeed();
          unsubscribeFeed = null;
          startFeedListener();
        }
        // If we're viewing the profile of that user, re-render the profile
        if (window.currentProfileUid === creatorId) {
          renderUserProfile(creatorId);
        }
      }
      return;
    }

    // Like
    const like = e.target.closest('.like-btn');
    if (like) {
      e.preventDefault();
      if (!currentUser) { showToast('Login to like', 'error'); return; }
      const card = like.closest('.video-card');
      if (!card) return;
      const docId = card.dataset.docId;
      if (!docId) return;
      const isLiked = like.querySelector('i').classList.contains('fas');
      const span = like.querySelector('span');
      const currentCount = parseInt(span.innerText) || 0;
      try {
        if (!isLiked) {
          await updateDoc(doc(db,'videos',docId), { likesCount: increment(1) });
          await setDoc(doc(db,'interactions',`${currentUser.uid}_${docId}`), { liked: true }, { merge: true });
          like.querySelector('i').className = 'fas fa-heart text-red-500 text-3xl';
          span.innerText = currentCount + 1;
          const snap = await getDoc(doc(db,'videos',docId));
          const creatorId = snap.data().creatorId;
          if (creatorId !== currentUser.uid) {
            await sendNotification({ userId: creatorId, title: 'New like', body: `${currentUser.displayName} liked your video` });
          }
        } else {
          await updateDoc(doc(db,'videos',docId), { likesCount: increment(-1) });
          await setDoc(doc(db,'interactions',`${currentUser.uid}_${docId}`), { liked: false }, { merge: true });
          like.querySelector('i').className = 'far fa-heart text-3xl';
          span.innerText = Math.max(0, currentCount - 1);
        }
      } catch (err) {
        console.error('Like error:', err);
        showToast('Error updating like: ' + err.message, 'error');
      }
      return;
    }

    // Comment
    const comment = e.target.closest('.comment-btn');
    if (comment) {
      e.preventDefault();
      if (!currentUser) { showToast('Login to comment', 'error'); return; }
      const card = comment.closest('.video-card');
      if (!card) return;
      const docId = card.dataset.docId;
      if (!docId) return;
      showComments(docId);
      return;
    }

    // Share
    const share = e.target.closest('.share-btn');
    if (share) {
      e.preventDefault();
      const card = share.closest('.video-card');
      if (!card) return;
      const docId = card.dataset.docId;
      if (!docId) return;
      const url = `https://vibeloop.ng/watch/${docId}`;
      const text = `Check this video on VibeLoop! Use my code ${currentUser?.uid.slice(0,6) || 'guest'} for coins.`;
      if (navigator.share) {
        try {
          await navigator.share({ title: 'VibeLoop', text, url });
        } catch (err) {
          if (err.name !== 'AbortError') console.warn('Share cancelled:', err);
        }
      } else {
        window.open(`https://wa.me/?text=${encodeURIComponent(text+' '+url)}`, '_blank');
      }
      await updateDoc(doc(db,'videos',docId), { sharesCount: increment(1) });
      return;
    }

    // Gift
    const gift = e.target.closest('.gift-btn');
    if (gift) {
      e.preventDefault();
      if (!currentUser) { showToast('Login to send gifts', 'error'); return; }
      const card = gift.closest('.video-card');
      if (!card) return;
      const docId = card.dataset.docId;
      if (!docId) return;
      const snap = await getDoc(doc(db,'videos',docId));
      if (!snap.exists()) return;
      const creatorId = snap.data().creatorId;
      const type = prompt('Gift: rose(50), diamond(500), rocket(5000)');
      if (!type) return;
      try {
        await sendGift({ toUserId: creatorId, videoId: docId, giftType: type });
        showToast('🎁 Gift sent!');
      } catch (err) {
        console.error('Gift error:', err);
        showToast('Not enough coins or error', 'error');
      }
      return;
    }

    // Report
    const report = e.target.closest('.report-btn');
    if (report) {
      e.preventDefault();
      if (!currentUser) { showToast('Login to report', 'error'); return; }
      const card = report.closest('.video-card');
      if (!card) return;
      const docId = card.dataset.docId;
      if (!docId) return;
      const reason = prompt('Why are you reporting this video?');
      if (!reason) return;
      try {
        await addDoc(collection(db,'reports'), {
          videoId: docId,
          reason,
          reportedBy: currentUser.uid,
          timestamp: serverTimestamp()
        });
        showToast('Report submitted');
      } catch (err) {
        console.error('Report error:', err);
        showToast('Error reporting: ' + err.message, 'error');
      }
      return;
    }

    // Profile video thumbnail click – open modal
    const thumb = e.target.closest('.user-video-thumb');
    if (thumb) {
      const docId = thumb.dataset.docId;
      if (docId) openVideoModal(docId);
      return;
    }

    // Chat user click – open conversation
    const chatUser = e.target.closest('.chat-user');
    if (chatUser) {
      const uid = chatUser.dataset.uid;
      if (uid) openChat(uid);
      return;
    }

    // Feed tab switching
    const feedTab = e.target.closest('.feed-tab');
    if (feedTab) {
      const tab = feedTab.dataset.tab;
      if (tab && tab !== feedFilter) {
        feedFilter = tab;
        document.querySelectorAll('.feed-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
        if (unsubscribeFeed) {
          unsubscribeFeed();
          unsubscribeFeed = null;
        }
        if (tab === 'following' && currentUser) {
          const followsSnap = await getDocs(query(collection(db,'follows'), where('followerId','==',currentUser.uid)));
          followedUsers = new Set(followsSnap.docs.map(d => d.data().followeeId));
        }
        startFeedListener();
      }
      return;
    }

    // Edit profile button
    const editProfile = e.target.closest('#editProfileBtn');
    if (editProfile) {
      e.preventDefault();
      showEditProfileModal();
      return;
    }
  });

  // ─── Video modal ──────────────────────────────────────────
  async function openVideoModal(docId) {
    const snap = await getDoc(doc(db,'videos',docId));
    if (!snap.exists()) { showToast('Video not found', 'error'); return; }
    const video = snap.data();
    const modal = document.createElement('div');

      <div class="close-modal" onclick="this.closest('.video-modal').remove()">✕</div>
      <video src="${video.videoUrl}" controls autoplay playsinline></video>
    `;

    modal.addEventListener('click', (e) => {
      if (e.target === modal) modal.remove();
    });

  window.openVideoModal = openVideoModal;

  // ─── Navigation ──────────────────────────────────────────────
  function setActiveTab(tab) {
    viewingProfile = false;
    activeTab = tab;
    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.classList.toggle('text-purple-500', btn.dataset.nav === tab);
      btn.classList.toggle('text-gray-400', btn.dataset.nav !== tab);
    });
    const area = document.getElementById('contentArea');
    if (tab === 'feed') {
      area.innerHTML = `
        <div class="sticky top-0 z-30 bg-black/90 backdrop-blur-lg p-3 border-b border-white/10">
          <div class="flex items-center gap-2">
            <div class="feed-header-logo">
              <i class="fas fa-waveform"></i>
              <span>VibeLoop</span>
            </div>
            <button class="feed-tab active" data-tab="forYou">For You</button>
            <button class="feed-tab" data-tab="following">Following</button>
            <div class="flex-1"></div>
            <i class="fas fa-search text-gray-400 mr-1"></i>
            <input id="searchInput" class="search-bar" placeholder="Search videos..." />
          </div>
        </div>
        <div id="feedStack" class="h-screen overflow-y-scroll snap-y snap-mandatory scroll-smooth"></div>
        <div id="feedLoader" class="loader"></div>
      `;
      document.querySelectorAll('.feed-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === feedFilter));
      const searchInput = document.getElementById('searchInput');
      searchInput.addEventListener('input', (e) => {
        searchQuery = e.target.value;
        if (unsubscribeFeed) {
          unsubscribeFeed();
          unsubscribeFeed = null;
        }
        startFeedListener();
      });
      feedVideos = [];
      startFeedListener();
    } else if (tab === 'trending') {
      if (unsubscribeFeed) { unsubscribeFeed(); unsubscribeFeed = null; }
      renderTrending();
    } else if (tab === 'chat') {
      if (unsubscribeFeed) { unsubscribeFeed(); unsubscribeFeed = null; }
      renderChatList();
    } else if (tab === 'profile') {
      if (unsubscribeFeed) { unsubscribeFeed(); unsubscribeFeed = null; }
      renderProfile();
    }
  }

  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => setActiveTab(btn.dataset.nav));
  });

  // ─── Trending ────────────────────────────────────────────────
  async function renderTrending() {
    document.getElementById('contentArea').innerHTML = `<div class="p-4"><h2 class="text-2xl font-bold">🔥 Trending</h2><div id="trendingList" class="space-y-3 mt-4"></div></div>`;
    try {
      const snap = await getDocs(query(collection(db,'videos'), orderBy('likesCount','desc'), limit(20)));
      const list = document.getElementById('trendingList');
      list.innerHTML = '';
      const readyVideos = snap.docs.filter(d => d.data().status === 'ready');
      readyVideos.forEach(d => {
        const v = d.data();
        list.innerHTML += `<div class="flex gap-3 bg-white/5 rounded-xl p-2" onclick="window.openVideoModal('${d.id}')">
          <video src="${v.lowResUrl || v.videoUrl}" class="w-28 h-40 rounded-lg object-cover" preload="metadata"></video>
          <div><p class="font-bold">${escapeHtml(v.caption?.slice(0,40))}</p><p>❤️ ${v.likesCount} 👁️ ${v.viewsCount}</p></div>
        </div>`;
      });
      if (readyVideos.length === 0) {
        list.innerHTML = `<div class="text-center text-gray-400 py-8">No trending videos yet</div>`;
      }
    } catch (e) {
      console.error(e);
      showToast('Error loading trending: '+e.message, 'error');
    }
  }

  // ─── Profile (My Profile) ──────────────────────────────────
  async function renderProfile() {
    try {
      const userSnap = await getDoc(doc(db,'users',currentUser.uid));
      const user = userSnap.data() || {};
      const videosSnap = await getDocs(query(collection(db,'videos'), where('creatorId','==',currentUser.uid)));
      let totalViews=0,totalWatch=0,totalCoins=0;
      videosSnap.forEach(v=>{ totalViews += v.data().viewsCount||0; totalWatch += v.data().watchTimeTotal||0; });
      const giftsSnap = await getDocs(query(collection(db,'gifts'), where('to','==',currentUser.uid)));
      giftsSnap.forEach(g=> totalCoins += g.data().amount||0);
      const avatarUrl = user.avatarUrl || 'https://ui-avatars.com/api/?name='+encodeURIComponent(user.username||currentUser.email.split('@')[0])+'&size=120';
      document.getElementById('contentArea').innerHTML = `
        <div class="p-5 text-center">
          <img src="${avatarUrl}" class="profile-avatar mx-auto" alt="profile" />
          <h2 class="text-2xl font-bold mt-2">@${escapeHtml(user.username||currentUser.email.split('@')[0])}</h2>
          <p class="text-gray-400 text-sm">${escapeHtml(user.bio||'VibeLooper')}</p>
          <button id="editProfileBtn" class="bg-white/10 px-4 py-1 rounded-full text-sm mt-2 hover:bg-white/20 transition"><i class="fas fa-pen"></i> Edit Profile</button>
          <div class="flex justify-center gap-6 my-4">
            <div><span class="font-bold">${user.followersCount||0}</span><p class="text-xs">Followers</p></div>
            <div><span>${user.followingCount||0}</span><p class="text-xs">Following</p></div>
            <div><span>${user.coins||0}</span><p class="text-xs">💰 Coins</p></div>
          </div>
          <div class="bg-white/5 rounded-xl p-3 mb-4">
            <h3 class="font-bold">📊 Creator Analytics</h3>
            <div class="flex justify-around text-sm mt-2">
              <div>👁️ ${totalViews} views</div>
              <div>⏱️ ${Math.floor(totalWatch/60)} min</div>
              <div>🎁 ${totalCoins} coins</div>
            </div>
          </div>
          <button id="buyCoinsBtn" class="bg-yellow-600 px-4 py-2 rounded-full text-sm">Buy Coins</button>
          <button id="logoutBtnApp" class="bg-red-600/50 px-4 py-2 rounded-full text-sm ml-2">Logout</button>
          <div id="userVideos" class="grid grid-cols-3 gap-1 mt-4"></div>
        </div>
      `;
      const grid = document.getElementById('userVideos');
      grid.innerHTML = '';
      videosSnap.forEach(v => {
        const vid = v.data();
        const thumb = document.createElement('div');
        thumb.className = 'user-video-thumb relative cursor-pointer';
        thumb.dataset.docId = v.id;
        thumb.innerHTML = `<video src="${vid.lowResUrl || vid.videoUrl}" class="aspect-square object-cover rounded-md" preload="metadata"></video>
          <div class="absolute bottom-1 right-1 bg-black/60 text-xs px-1 rounded">${vid.likesCount||0} ♥</div>`;
        grid.appendChild(thumb);
      });
      document.getElementById('buyCoinsBtn').onclick = () => showToast('Paystack coming soon', 'info');
      document.getElementById('logoutBtnApp').onclick = () => signOut(auth);
    } catch (e) {
      console.error(e);
      showToast('Error loading profile: '+e.message, 'error');
    }
  }

  // ─── Chat ────────────────────────────────────────────────────
  let currentChatPartner = null;

  async function renderChatList() {
    const area = document.getElementById('contentArea');
    area.innerHTML = `
      <div class="p-4">
        <h2 class="text-xl font-bold mb-4">💬 Messages</h2>
        <div id="chatUsersList"></div>
        <button id="newChatBtn" class="bg-purple-600 px-4 py-2 rounded-full text-sm mt-4">New Chat</button>
      </div>
    `;
    const usersSnap = await getDocs(collection(db,'users'));
    const list = document.getElementById('chatUsersList');
    list.innerHTML = '';
    usersSnap.forEach(d => {
      const u = d.data();
      if (d.id === currentUser.uid) return;
      const div = document.createElement('div');
      div.className = 'chat-user';
      div.dataset.uid = d.id;
      const avatar = u.avatarUrl || 'https://ui-avatars.com/api/?name='+encodeURIComponent(u.username||'User');
      div.innerHTML = `
        <div class="avatar"><img src="${avatar}" alt="avatar" /></div>
        <div><strong>${escapeHtml(u.username || 'User')}</strong></div>
      `;
      list.appendChild(div);
    });
    document.getElementById('newChatBtn').onclick = () => {
      const uid = prompt('Enter user ID to chat with:');
      if (uid) openChat(uid);
    };
    window.openChat = openChat;
  }

  async function openChat(partnerUid) {
    if (!partnerUid) return;
    currentChatPartner = partnerUid;
    const roomId = [currentUser.uid, partnerUid].sort().join('_');
    const area = document.getElementById('contentArea');
    area.innerHTML = `
      <div class="flex flex-col h-full">
        <div class="p-3 border-b border-white/10 flex items-center gap-2">
          <button id="backChatBtn" class="text-purple-400"><i class="fas fa-arrow-left"></i></button>
          <span class="font-bold">Chat</span>
        </div>
        <div id="chatMessages" class="chat-messages"></div>
        <div class="chat-input">
          <input id="chatInput" placeholder="Type a message..." />
          <button id="sendChatBtn">Send</button>
        </div>
      </div>
    `;
    if (unsubscribeMessages) unsubscribeMessages();
    const q = query(collection(db,'chats',roomId,'messages'), orderBy('timestamp','asc'));
    unsubscribeMessages = onSnapshot(q, (snap) => {
      const container = document.getElementById('chatMessages');
      container.innerHTML = '';
      snap.forEach(d => {
        const msg = d.data();
        const div = document.createElement('div');
        div.className = `message ${msg.senderId === currentUser.uid ? 'sent' : 'received'}`;
        div.innerText = msg.text;
        container.appendChild(div);
      });
      container.scrollTop = container.scrollHeight;
    });

    document.getElementById('backChatBtn').onclick = () => renderChatList();
    document.getElementById('sendChatBtn').onclick = async () => {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text) return;
      await addDoc(collection(db,'chats',roomId,'messages'), {
        senderId: currentUser.uid,
        senderName: currentUser.displayName || currentUser.email.split('@')[0],
        text,
        timestamp: serverTimestamp()
      });
      input.value = '';
    };
    document.getElementById('chatInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('sendChatBtn').click();
    });
  }

  // ─── Auth ────────────────────────────────────────────────────
  document.getElementById('emailLoginBtn').onclick = async () => {
    const email = document.getElementById('loginEmail').value;
    const pass = document.getElementById('loginPass').value;
    try { await signInWithEmailAndPassword(auth, email, pass); } catch(e) { showToast(e.message, 'error'); }
  };
  document.getElementById('emailSignupBtn').onclick = async () => {
    const email = document.getElementById('loginEmail').value;
    const pass = document.getElementById('loginPass').value;
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      await setDoc(doc(db,'users',cred.user.uid), { 
        email, 
        username: email.split('@')[0], 
        coins: 0, 
        followersCount: 0,
        followingCount: 0,
        createdAt: serverTimestamp() 
      });
      const ref = prompt('Referral code?');
      if (ref) {
        const snap = await getDoc(doc(db,'referrals',ref));
        if (snap.exists()) await addCoins({ amount:50, reason:'referral_bonus' });
      }
      await setDoc(doc(db,'referrals',cred.user.uid.slice(0,8)), { userId: cred.user.uid });
      showToast('Account created! Please login.');
    } catch(e) { showToast(e.message, 'error'); }
  };
  document.getElementById('googleLoginBtn').onclick = async () => {
    try {
      const result = await signInWithPopup(auth, googleProvider);
      const user = result.user;
      const ref = doc(db,'users',user.uid);
      if (!(await getDoc(ref)).exists()) {
        await setDoc(ref, { 
          email: user.email, 
          username: user.displayName, 
          avatarUrl: user.photoURL, 
          coins: 0,
          followersCount: 0,
          followingCount: 0,
          createdAt: serverTimestamp() 
        });
      }
    } catch(e) { showToast(e.message, 'error'); }
  };
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      currentUser = user;
      sessionCount++; localStorage.setItem('sessionCount', sessionCount);
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('mainApp').classList.remove('hidden');
      if (currentUser) {
        const followsSnap = await getDocs(query(collection(db,'follows'), where('followerId','==',currentUser.uid)));
        followedUsers = new Set(followsSnap.docs.map(d => d.data().followeeId));
      }
      setActiveTab('feed');
      if (sessionCount >= 2 && !notificationsRequested) {
        setTimeout(() => requestNotificationPermission(), 5000);
      }
    } else {
      if (unsubscribeFeed) { unsubscribeFeed(); unsubscribeFeed = null; }
      if (unsubscribeMessages) { unsubscribeMessages(); unsubscribeMessages = null; }
      document.getElementById('loginScreen').classList.remove('hidden');
      document.getElementById('mainApp').classList.add('hidden');
    }
  });

  // ─── Upload button ──────────────────────────────────────────
  document.getElementById('uploadFab').onclick = () => {
    document.getElementById('videoUploadInput').value = '';
    document.getElementById('videoUploadInput').click();
  };
  document.getElementById('videoUploadInput').onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    e.target.value = '';
    const caption = prompt('Caption (use #hashtags)');
    if (caption) await uploadVideo(file, caption);
    else showToast('Caption required', 'error');
  };

  async function requestNotificationPermission() {
    if (notificationsRequested) return;
    notificationsRequested = true;
    try {
      const token = await getToken(messaging, { vapidKey: 'YOUR_VAPID_KEY' });
      await updateDoc(doc(db,'users',currentUser.uid), { fcmToken: token });
      showToast('🔔 Notifications enabled');
    } catch (e) { console.log('Notification denied'); }
  }

  // Expose renderUserProfile for window (for on-demand calls)
  window.renderUserProfile = renderUserProfile;
</script>
</body>
</html>
