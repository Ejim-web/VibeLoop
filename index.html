        // Firebase config (your actual project)
        const firebaseConfig = {
            apiKey: "AIzaSyCr1IkJ6_SMhTJvY3K3GG6SoIRe1LOZ0nQ",
            authDomain: "vibeloop-44c45.firebaseapp.com",
            projectId: "vibeloop-44c45",
            storageBucket: "vibeloop-44c45.firebasestorage.app",
            messagingSenderId: "776248914692",
            appId: "1:776248914692:web:da4c237724243295351651",
            measurementId: "G-TW9PK00GNR"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Global state
        window.currentUser = null;
        window.lastVideoDoc = null;
        window.isLoadingFeed = false;

        const appContainer = document.getElementById('app');
        
        function showToast(msg, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-20 left-4 right-4 z-50 p-3 rounded-xl text-center text-sm font-semibold shadow-2xl transition-all duration-300 ${type === 'error' ? 'bg-red-600' : 'bg-black/80 backdrop-blur-lg'} text-white`;
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }
        
        // Mock Flutterwave
        window.flutterwavePay = (options) => {
            return new Promise((resolve) => {
                const modal = document.createElement('div');
                modal.className = 'fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-4';
                modal.innerHTML = `
                    <div class="bg-[#0f0f0f] rounded-2xl p-6 w-full max-w-sm border border-white/20">

        // Video compression (FFmpeg)
        async function compressVideo(file, targetWidth = 540) {
            if (!window.FFmpegLoaded) {
                showToast("⚙️ Loading compressor...", "info");
                await loadFFmpeg();
            }
            return new Promise(async (resolve) => {
                try {
                    const { createFFmpeg, fetchFile } = window.FFmpeg;
                    const ffmpeg = createFFmpeg({ log: false });
                    await ffmpeg.load();
                    ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(file));
                    await ffmpeg.run('-i', 'input.mp4', '-vf', `scale=${targetWidth}:-2`, '-b:v', '800k', '-preset', 'fast', 'output.mp4');
                    const data = ffmpeg.FS('readFile', 'output.mp4');
                    const compressedBlob = new Blob([data.buffer], { type: 'video/mp4' });
                    resolve(compressedBlob);
                } catch (err) {
                    console.warn("Compression failed", err);
                    resolve(file);
                }
            });
        }
        
        async function loadFFmpeg() {
            if (window.FFmpegLoaded) return;
            await import('https://unpkg.com/@ffmpeg/ffmpeg@0.12.6/dist/ffmpeg.min.js');
            await import('https://unpkg.com/@ffmpeg/core@0.12.6/dist/ffmpeg-core.js');
            window.FFmpegLoaded = true;
        }
        
        // ========== AUTH UI ==========
        function renderAuthScreen() {
            appContainer.innerHTML = `
                <div class="min-h-screen bg-gradient-to-br from-black via-gray-900 to-black flex items-center justify-center p-6">
                    <div class="w-full max-w-md space-y-6">
                        <div class="text-center">
                            <i class="fas fa-waveform text-6xl text-purple-500"></i>
                            <h1 class="text-4xl font-black bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent mt-2">VibeLoop</h1>
                            <p class="text-gray-400 text-sm">Infinite vibes, endless loops</p>
                        </div>
                        <div class="bg-white/5 backdrop-blur-xl rounded-2xl p-6 border border-white/10">
                            <input id="authEmail" type="email" placeholder="Email" class="w-full bg-black/50 border border-white/20 rounded-xl p-3 text-white mb-3 focus:outline-none focus:border-purple-500">
                            <input id="authPass" type="password" placeholder="Password" class="w-full bg-black/50 border border-white/20 rounded-xl p-3 text-white mb-4 focus:outline-none focus:border-purple-500">
                            <button id="loginBtn" class="w-full bg-purple-600 py-3 rounded-xl font-bold mb-2">Login</button>
                            <button id="signupBtn" class="w-full border border-white/30 py-3 rounded-xl font-semibold mb-3">Create Account</button>
                            <div class="relative my-3"><div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/20"></div></div><div class="relative flex justify-center text-xs"><span class="bg-black px-2 text-gray-400">OR</span></div></div>
                            <button id="googleBtn" class="w-full bg-white/10 hover:bg-white/20 py-3 rounded-xl font-semibold flex items-center justify-center gap-2"><i class="fab fa-google"></i> Sign in with Google</button>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('loginBtn').onclick = () => handleAuth('login');
            document.getElementById('signupBtn').onclick = () => handleAuth('signup');
            document.getElementById('googleBtn').onclick = handleGoogleSignIn;
        }
        
        async function handleAuth(mode) {
            const email = document.getElementById('authEmail').value;
            const pass = document.getElementById('authPass').value;
            if (!email || !pass) return showToast("Fill all fields", "error");
            try {
                if (mode === 'login') {
                    await signInWithEmailAndPassword(auth, email, pass);
                } else {
                    const cred = await createUserWithEmailAndPassword(auth, email, pass);
                    await setDoc(doc(db, "users", cred.user.uid), {
                        username: email.split('@')[0], 
                        email, 
                        bio: "VibeLooper", 
                        createdAt: serverTimestamp(), 
                        avatar: "https://i.pravatar.cc/150", 
                        isAdmin: false, 
                        followers: [], 
                        following: [], 
                        subscriptionActive: false
                    });
                    await updateProfile(cred.user, { displayName: email.split('@')[0] });
                }
                showToast(`Welcome ${mode === 'login' ? 'back' : 'to VibeLoop'}!`);
                // No need to call renderMainUI here; onAuthStateChanged will do it.
            } catch(e) { showToast(e.message, "error"); }
        }
        
        async function handleGoogleSignIn() {
            try {
                const result = await signInWithPopup(auth, googleProvider);
                const user = result.user;
                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);
                if (!userSnap.exists()) {
                    await setDoc(userRef, {
                        username: user.displayName?.replace(/\s/g, '') || user.email.split('@')[0],
                        email: user.email,
                        bio: "VibeLooper",
                        createdAt: serverTimestamp(),
                        avatar: user.photoURL || "https://i.pravatar.cc/150",
                        isAdmin: false,
                        followers: [],
                        following: [],
                        subscriptionActive: false
                    });
                }
                showToast(`Welcome ${user.displayName || 'Viber'}!`);
            } catch(e) { showToast(e.message, "error"); }
        }
        
        // ========== MAIN UI ==========
        function renderMainUI() {
            if (!window.currentUser) return;
            appContainer.innerHTML = `
                <div class="fixed bottom-0 left-0 right-0 z-50 bg-black/80 backdrop-blur-2xl border-t border-white/10 safe-bottom pb-2 flex justify-around items-center py-2">
                    <button data-nav="feed" class="nav-btn flex flex-col items-center text-xs ${window.activeTab === 'feed' ? 'text-purple-500' : 'text-gray-400'}"><i class="fas fa-play-circle text-2xl"></i><span>Feed</span></button>
                    <button data-nav="trending" class="nav-btn flex flex-col items-center text-xs ${window.activeTab === 'trending' ? 'text-purple-500' : 'text-gray-400'}"><i class="fas fa-fire text-2xl"></i><span>Trending</span></button>
                    <button data-nav="search" class="nav-btn flex flex-col items-center text-xs ${window.activeTab === 'search' ? 'text-purple-500' : 'text-gray-400'}"><i class="fas fa-search text-2xl"></i><span>Search</span></button>
                    <button data-nav="profile" class="nav-btn flex flex-col items-center text-xs ${window.activeTab === 'profile' ? 'text-purple-500' : 'text-gray-400'}"><i class="fas fa-user text-2xl"></i><span>Me</span></button>
                    ${window.adminFlag ? `<button data-nav="admin" class="nav-btn flex flex-col items-center text-xs text-amber-400"><i class="fas fa-shield-alt text-2xl"></i><span>Admin</span></button>` : ''}
                </div>
                <div id="contentArea" class="pb-20"></div>
                <button id="uploadFab" class="fixed right-5 bottom-24 bg-gradient-to-r from-purple-600 to-pink-600 w-14 h-14 rounded-full shadow-2xl flex items-center justify-center text-white text-2xl z-40"><i class="fas fa-plus"></i></button>
            `;
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.onclick = () => { window.activeTab = btn.dataset.nav; renderMainUI(); };
            });
            document.getElementById('uploadFab').onclick = () => showUploadModal();
            loadContentByTab();
        }
        
        async function loadContentByTab() {
            const area = document.getElementById('contentArea');
            if (!area) return;
            if (window.activeTab === 'feed') await renderFeed(area);
            if (window.activeTab === 'trending') await renderTrending(area);
            if (window.activeTab === 'search') await renderSearch(area);
            if (window.activeTab === 'profile') await renderProfile(area, window.currentUser?.uid);
            if (window.activeTab === 'admin' && window.adminFlag) await renderAdminDashboard(area);
        }
        
        // Feed with infinite scroll
        async function renderFeed(container) {
            container.innerHTML = `<div id="feedStack" class="h-screen overflow-y-scroll snap-y snap-mandatory scroll-smooth"></div><div id="feedLoader" class="text-center py-4"><i class="fas fa-spinner fa-pulse"></i> Loading vibes...</div>`;
            const feedStack = document.getElementById('feedStack');
            window.lastVideoDoc = null;
            window.isLoadingFeed = false;
            let videoItems = [];
            
            async function fetchVideos() {
                if (window.isLoadingFeed) return;
                window.isLoadingFeed = true;
                let q = query(collection(db, "videos"), orderBy("likesCount", "desc"), limit(3));
                const snap = await getDocs(q);
                if (snap.empty) { document.getElementById('feedLoader')?.remove(); return; }
                snap.forEach(docSnap => { if(!videoItems.find(v=>v.id===docSnap.id)) videoItems.push({ id: docSnap.id, ...docSnap.data() }); });
                const recentQ = query(collection(db, "videos"), orderBy("createdAt", "desc"), limit(2));
                const recentSnap = await getDocs(recentQ);
                recentSnap.forEach(docSnap => { if(!videoItems.find(v=>v.id===docSnap.id)) videoItems.push({ id: docSnap.id, ...docSnap.data() }); });
                renderVideoStack(feedStack, videoItems);
                window.isLoadingFeed = false;
            }
            
            function renderVideoStack(parent, videos) {
                parent.innerHTML = videos.map(v => createVideoCard(v)).join('');
                attachVideoInteractions();
                const lastCard = document.querySelector('.video-card:last-child');
                if (lastCard) {
                    const observer = new IntersectionObserver(entries => {
                        if (entries[0].isIntersecting) fetchVideos();
                    }, { threshold: 0.5 });
                    observer.observe(lastCard);
                }
            }
            fetchVideos();
        }
        
        function createVideoCard(video) {
            const isLiked = video.likedBy?.includes(window.currentUser?.uid);
            return `
                <div class="video-card relative h-screen snap-start snap-always bg-black" data-id="${video.id}">
                    <video src="${video.videoUrl}" class="absolute inset-0 w-full h-full object-cover" autoplay muted loop playsinline></video>
                    <div class="absolute bottom-28 left-4 right-20 z-20">
                        <div class="flex items-center gap-2"><i class="fas fa-user-circle text-2xl"></i><span class="font-bold">${video.creatorName || 'Viber'}</span><button class="follow-btn text-xs bg-white/20 px-2 py-1 rounded-full" data-creator="${video.creatorId}">Follow</button></div>
                        <p class="text-sm mt-2">${video.caption || '🎵 vibe with me'}</p>
                    </div>
                    <div class="absolute bottom-28 right-3 z-20 flex flex-col gap-5 items-center">
                        <button class="like-btn"><i class="${isLiked ? 'fas fa-heart text-red-500' : 'far fa-heart'} text-3xl drop-shadow-lg"></i><span class="text-xs block">${video.likesCount || 0}</span></button>
                        <button class="comment-btn"><i class="far fa-comment text-3xl"></i><span class="text-xs block">${video.commentsCount || 0}</span></button>
                        <button class="gift-btn"><i class="fas fa-gift text-3xl"></i><span>Gift</span></button>
                        <button class="report-btn"><i class="fas fa-flag text-2xl"></i></button>
                    </div>
                </div>
            `;
        }
        
        function attachVideoInteractions() {
            document.querySelectorAll('.like-btn').forEach(btn => {
                btn.onclick = async (e) => {
                    e.stopPropagation();
                    const card = btn.closest('.video-card');
                    const vidId = card.dataset.id;
                    const vidRef = doc(db, "videos", vidId);
                    const liked = btn.querySelector('i').classList.contains('fas');
                    if (!liked) {
                        await updateDoc(vidRef, { likesCount: increment(1), likedBy: arrayUnion(window.currentUser.uid) });
                        btn.querySelector('i').className = "fas fa-heart text-red-500 text-3xl";
                        const videoSnap = await getDoc(vidRef);
                        const creatorId = videoSnap.data().creatorId;
                        if (creatorId !== window.currentUser.uid) {
                            await addDoc(collection(db, "notifications"), { userId: creatorId, message: `${window.currentUser.displayName || 'Someone'} liked your video`, timestamp: serverTimestamp() });
                        }
                    } else {
                        await updateDoc(vidRef, { likesCount: increment(-1), likedBy: arrayRemove(window.currentUser.uid) });
                        btn.querySelector('i').className = "far fa-heart text-3xl";
                    }
                    const countSpan = btn.querySelector('span');
                    let count = parseInt(countSpan.innerText) || 0;
                    countSpan.innerText = !liked ? count+1 : Math.max(0, count-1);
                };
            });
            document.querySelectorAll('.follow-btn').forEach(btn => {
                btn.onclick = async () => {
                    const creatorId = btn.dataset.creator;
                    const userRef = doc(db, "users", window.currentUser.uid);
                    await updateDoc(userRef, { following: arrayUnion(creatorId) });
                    await updateDoc(doc(db, "users", creatorId), { followers: arrayUnion(window.currentUser.uid) });
                    await addDoc(collection(db, "notifications"), { userId: creatorId, message: `${window.currentUser.displayName || 'Someone'} started following you`, timestamp: serverTimestamp() });
                    showToast("Followed creator");
                };
            });
            document.querySelectorAll('.comment-btn').forEach(btn => {
                btn.onclick = () => { const vidId = btn.closest('.video-card').dataset.id; showCommentModal(vidId); };
            });
            document.querySelectorAll('.gift-btn').forEach(btn => {
                btn.onclick = async () => {
                    const vidId = btn.closest('.video-card').dataset.id;
                    const videoSnap = await getDoc(doc(db, "videos", vidId));
                    const creatorId = videoSnap.data().creatorId;
                    const payment = await window.flutterwavePay({ amount: 2.99, text: "Send 💎 virtual gift" });
                    if(payment) {
                        await addDoc(collection(db, "gifts"), { from: window.currentUser.uid, to: creatorId, amount: 2.99, timestamp: serverTimestamp() });
                        await addDoc(collection(db, "notifications"), { userId: creatorId, message: `🎁 You received a gift from ${window.currentUser.displayName || 'a fan'}`, timestamp: serverTimestamp() });
                        showToast("Gift sent! 🎁");
                    }
                };
            });
            document.querySelectorAll('.report-btn').forEach(btn => {
                btn.onclick = async () => {
                    const vidId = btn.closest('.video-card').dataset.id;
                    const reason = prompt("Why are you reporting this video?");
                    if(reason) {
                        await addDoc(collection(db, "reports"), { videoId: vidId, reason, reportedBy: window.currentUser.uid, timestamp: serverTimestamp() });
                        showToast("Report submitted.");
                    }
                };
            });
        }
        
        async function showCommentModal(videoId) {
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-black/90 z-50 flex flex-col';
            modal.innerHTML = `<div class="bg-[#0f0f0f] rounded-t-2xl mt-auto p-4 max-h-[70vh] overflow-y-auto"><h3 class="font-bold text-lg">Comments</h3><div id="commentsList" class="my-3 space-y-2"></div><div class="flex gap-2"><input id="newComment" placeholder="Add a vibe..." class="flex-1 bg-white/10 rounded-full p-2"><button id="postCommentBtn" class="bg-purple-600 px-4 rounded-full">Post</button></div><button id="closeModal" class="mt-3 text-gray-400">Close</button></div>`;
            document.body.appendChild(modal);
            const commentsSnap = await getDocs(query(collection(db, "videos", videoId, "comments"), orderBy("timestamp", "desc")));
            const commentsDiv = modal.querySelector('#commentsList');
            commentsSnap.forEach(c => { commentsDiv.innerHTML += `<p class="text-sm"><strong>${c.data().userName}</strong>: ${c.data().text}</p>`; });
            modal.querySelector('#postCommentBtn').onclick = async () => {
                const text = modal.querySelector('#newComment').value;
                if(text.trim()) {
                    await addDoc(collection(db, "videos", videoId, "comments"), { userId: window.currentUser.uid, userName: window.currentUser.displayName || "user", text, timestamp: serverTimestamp() });
                    await updateDoc(doc(db, "videos", videoId), { commentsCount: increment(1) });
                    const videoSnap = await getDoc(doc(db, "videos", videoId));
                    const creatorId = videoSnap.data().creatorId;
                    if (creatorId !== window.currentUser.uid) {
                        await addDoc(collection(db, "notifications"), { userId: creatorId, message: `${window.currentUser.displayName || 'Someone'} commented: "${text.slice(0,30)}"`, timestamp: serverTimestamp() });
                    }
                    showToast("Comment posted!");
                    modal.remove();
                }
            };
            modal.querySelector('#closeModal').onclick = () => modal.remove();
        }
        
        // Trending, Search, Profile, Admin, Upload (kept compact but functional)
        async function renderTrending(container) {
            container.innerHTML = '<div class="p-4"><h2 class="text-2xl font-bold">🔥 Trending Now</h2><div id="trendList" class="space-y-4 mt-4"></div></div>';
            const q = query(collection(db, "videos"), orderBy("likesCount", "desc"), limit(10));
            const snap = await getDocs(q);
            const listDiv = document.getElementById('trendList');
            listDiv.innerHTML = '';
            snap.forEach(doc => { listDiv.innerHTML += `<div class="flex gap-3 bg-white/5 rounded-xl p-2"><video src="${doc.data().videoUrl}" class="w-28 h-40 rounded-lg object-cover"></video><div><p class="font-bold">${doc.data().caption || "Trending"}</p><p>❤️ ${doc.data().likesCount || 0}</p></div></div>`; });
        }
        
        async function renderSearch(container) {
            container.innerHTML = `<div class="p-4"><input id="searchInput" placeholder="🔍 Search users or videos..." class="w-full p-3 bg-white/10 rounded-full mb-4"><div id="searchResults"></div></div>`;
            const searchInput = document.getElementById('searchInput');
            searchInput.oninput = async () => {
                const term = searchInput.value.toLowerCase();
                if(!term) return;
                const usersSnap = await getDocs(collection(db, "users"));
                const videosSnap = await getDocs(collection(db, "videos"));
                let results = [];
                usersSnap.forEach(u => { if(u.data().username?.includes(term)) results.push({ type: 'user', name: u.data().username, avatar: u.data().avatar }); });
                videosSnap.forEach(v => { if(v.data().caption?.toLowerCase().includes(term)) results.push({ type: 'video', caption: v.data().caption }); });
                document.getElementById('searchResults').innerHTML = results.slice(0,8).map(r => r.type === 'user' ? `<div class="p-2 border-b flex items-center gap-2"><img src="${r.avatar}" class="w-8 h-8 rounded-full">👤 ${r.name}</div>` : `<div class="p-2 border-b">🎬 ${r.caption}</div>`).join('');
            };
        }
        
        async function renderProfile(container, userId) {
            const userDoc = await getDoc(doc(db, "users", userId));
            const userData = userDoc.data();
            container.innerHTML = `
                <div class="p-5 text-center"><img src="${userData.avatar}" class="w-24 h-24 rounded-full mx-auto border-4 border-purple-500"><h2 class="text-2xl font-bold mt-2">@${userData.username}</h2><p>${userData.bio}</p>
                <div class="flex justify-center gap-6 my-4"><div><span class="font-bold">${userData.followers?.length || 0}</span><p class="text-xs">Followers</p></div><div><span>${userData.following?.length || 0}</span><p class="text-xs">Following</p></div></div>
                ${!userData.subscriptionActive ? `<button id="subBtn" class="bg-pink-600 px-6 py-2 rounded-full">✨ Subscribe Premium ($4.99/mo)</button>` : `<span class="bg-green-600 px-4 py-1 rounded-full">🌟 Premium Member</span>`}
                <button id="boostBtn" class="block w-full mt-3 bg-amber-600/30 rounded-xl p-2">🚀 Boost My Profile ($9.99 featured)</button>
                </div><div id="userVideos" class="grid grid-cols-3 gap-1 mt-4"></div>
            `;
            const videosSnap = await getDocs(query(collection(db, "videos"), where("creatorId", "==", userId)));
            const grid = document.getElementById('userVideos');
            grid.innerHTML = '';
            videosSnap.forEach(v => { grid.innerHTML += `<video src="${v.data().videoUrl}" class="aspect-square object-cover rounded-md"></video>`; });
            if(document.getElementById('subBtn')) document.getElementById('subBtn').onclick = async () => {
                const res = await window.flutterwavePay({ amount: 4.99, text: "Subscribe to Premium" });
                if(res) { await updateDoc(doc(db, "users", userId), { subscriptionActive: true }); showToast("Premium activated!"); renderProfile(container, userId); }
            };
            if(document.getElementById('boostBtn')) document.getElementById('boostBtn').onclick = async () => {
                const res = await window.flutterwavePay({ amount: 9.99, text: "Creator Boost" });
                if(res) { await addDoc(collection(db, "boostRequests"), { userId, timestamp: serverTimestamp() }); showToast("Profile boosted!"); }
            };
        }
        
        async function showUploadModal() {
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4';
            modal.innerHTML = `<div class="bg-[#111] w-full max-w-md rounded-2xl p-5"><h3 class="text-xl font-bold">Upload new vibe</h3><input type="file" id="videoUploadInput" accept="video/*"><input id="captionInput" placeholder="Caption..." class="w-full mt-3 bg-white/10 p-2 rounded-full"><button id="uploadSubmit" class="mt-4 w-full bg-purple-600 py-2 rounded-full">Compress & Upload</button><div id="compressProgress" class="text-xs text-center mt-2 text-gray-400"></div></div>`;
            document.body.appendChild(modal);
            document.getElementById('uploadSubmit').onclick = async () => {
                const file = document.getElementById('videoUploadInput').files[0];
                const caption = document.getElementById('captionInput').value;
                if(!file) return showToast("Select video", "error");
                document.getElementById('compressProgress').innerText = "Compressing...";
                const compressed = await compressVideo(file, 540);
                const storageRef = ref(storage, `videos/${Date.now()}_${file.name}`);
                await uploadBytes(storageRef, compressed);
                const url = await getDownloadURL(storageRef);
                await addDoc(collection(db, "videos"), {
                    videoUrl: url, caption: caption || "✨ New loop", creatorId: window.currentUser.uid, creatorName: window.currentUser.displayName || "Viber", likesCount: 0, commentsCount: 0, likedBy: [], createdAt: serverTimestamp()
                });
                showToast("Uploaded!");
                modal.remove();
                renderMainUI();
            };
        }
        
        async function renderAdminDashboard(container) {
            const reportsSnap = await getDocs(collection(db, "reports"));
            const videosSnap = await getDocs(collection(db, "videos"));
            container.innerHTML = `<div class="p-4"><h2 class="text-2xl font-bold">🛡️ Admin</h2><div><p>Reports</p><div id="reportsList"></div><hr/><p>Videos</p><div id="adminVideos"></div></div></div>`;
            const reportsDiv = document.getElementById('reportsList');
            reportsDiv.innerHTML = '';
            reportsSnap.forEach(r => { reportsDiv.innerHTML += `<div class="bg-red-900/30 p-2 my-1">${r.data().reason} <button class="delReportBtn text-red-300" data-id="${r.id}">X</button></div>`; });
            const adminVideosDiv = document.getElementById('adminVideos');
            adminVideosDiv.innerHTML = '';
            videosSnap.forEach(v => { adminVideosDiv.innerHTML += `<div class="flex justify-between bg-white/5 p-2 my-1"><span>${v.data().caption || "video"}</span><button class="delVideoBtn bg-red-600 px-2 rounded" data-id="${v.id}">Delete</button></div>`; });
            document.querySelectorAll('.delVideoBtn').forEach(btn => { btn.onclick = async () => { await deleteDoc(doc(db, "videos", btn.dataset.id)); renderAdminDashboard(container); }; });
            document.querySelectorAll('.delReportBtn').forEach(btn => { btn.onclick = async () => { await deleteDoc(doc(db, "reports", btn.dataset.id)); renderAdminDashboard(container); }; });
        }
        
        function setupRealtimeNotifications() {
            if(window.notificationsUnsubscribe) window.notificationsUnsubscribe();
            const q = query(collection(db, "notifications"), where("userId", "==", window.currentUser?.uid), orderBy("timestamp", "desc"));
            window.notificationsUnsubscribe = onSnapshot(q, (snap) => {
                snap.docChanges().forEach(change => {
                    if(change.type === 'added') showToast(`📢 ${change.doc.data().message}`, 'info');
                });
            });
        }
        
        // Ads every 45 sec
        setInterval(() => {
            if(window.activeTab === 'feed' && document.querySelector('.video-card') && window.currentUser) {
                const ad = document.createElement('div');
                ad.className = 'fixed bottom-32 left-4 right-4 bg-black/80 backdrop-blur-lg p-3 rounded-xl text-center text-white text-xs z-50 border border-white/20';
                ad.innerHTML = `<i class="fas fa-ad"></i> Sponsored: VibeStyle Sneakers - Limited`;
                document.body.appendChild(ad);
                setTimeout(() => ad.remove(), 5000);
            }
        }, 45000);
        
        // Auth state handler
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                window.currentUser = user;
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    window.adminFlag = userDoc.data().isAdmin === true;
                } else {
                    // create missing user doc
                    await setDoc(doc(db, "users", user.uid), {
                        username: user.email.split('@')[0],
                        email: user.email,
                        bio: "VibeLooper",
                        createdAt: serverTimestamp(),
                        avatar: "https://i.pravatar.cc/150",
                        isAdmin: false,
                        followers: [],
                        following: [],
                        subscriptionActive: false
                    });
                }
                setupRealtimeNotifications();
                renderMainUI();
            } else {
                window.currentUser = null;
                renderAuthScreen();
            }
        });
    </script>
    <style>
        * { font-family: 'Inter', sans-serif; scrollbar-width: thin; }
        body { background: black; overflow-x: hidden; }
        .snap-y { scroll-snap-type: y mandatory; }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        video { pointer-events: none; }
        .video-card { scroll-snap-align: start; }
    </style>
</head>
<body class="bg-black text-white">
    <div id="app" class="relative min-h-screen"></div>
</body>
</html>
