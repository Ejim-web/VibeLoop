<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>VibeLoop – Viral Short Videos</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link rel="stylesheet" href="css/styles.css" />
  <meta name="theme-color" content="#8b5cf6" />
</head>
<body>
  <!-- Login Screen -->
  <div id="loginScreen" class="login-screen">
    <div class="login-container">
      <div class="login-logo"><i class="fas fa-waveform"></i><span>VibeLoop</span></div>
      <p class="tagline">Low data. High vibes.</p>
      <div class="login-form">
        <input type="email" id="loginEmail" placeholder="Email" />
        <input type="password" id="loginPass" placeholder="Password" />
        <button id="emailLoginBtn">Login</button>
        <button id="emailSignupBtn">Create Account</button>
        <div class="divider">OR</div>
        <button id="googleLoginBtn"><i class="fab fa-google"></i> Google</button>
      </div>
      <p class="terms">By continuing, you agree to our Terms</p>
    </div>
  </div>

  <!-- Main App -->
  <div id="mainApp" class="main-app hidden">
    <nav class="bottom-nav">
      <button data-nav="feed" class="nav-btn active"><i class="fas fa-play-circle"></i><span>Home</span></button>
      <button data-nav="explore" class="nav-btn"><i class="fas fa-compass"></i><span>Explore</span></button>
      <button data-nav="upload" class="nav-btn" id="navUpload"><i class="fas fa-plus-circle"></i><span>Upload</span></button>
      <button data-nav="chat" class="nav-btn"><i class="fas fa-comment-dots"></i><span>Chat</span></button>
      <button data-nav="profile" class="nav-btn"><i class="fas fa-user"></i><span>Me</span></button>
    </nav>

    <button id="uploadFab" class="upload-fab"><i class="fas fa-plus"></i></button>

    <div id="contentArea" class="content-area"></div>

    <input type="file" id="videoUploadInput" accept="video/*" />
    <input type="file" id="imageUploadInput" accept="image/*" />
  </div>

  <div id="soundHint" class="sound-hint"><i class="fas fa-volume-up"></i> Tap to unmute</div>

  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js",
        "firebase/storage": "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js",
        "firebase/functions": "https://www.gstatic.com/firebasejs/10.8.0/firebase-functions.js",
        "firebase/messaging": "https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging.js"
      }
    }
  </script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
